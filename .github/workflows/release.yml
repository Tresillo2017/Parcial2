name: Java CI with Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create lib directory
      run: mkdir -p lib

    - name: Download JUnit
      run: |
        curl -L -o lib/junit-platform-console-standalone.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.9.3/junit-platform-console-standalone-1.9.3.jar

    - name: Create bin directory
      run: mkdir -p bin

    - name: Compile
      run: |
        javac -cp ".:lib/junit-platform-console-standalone.jar" -d bin *.java test/*.java

    - name: Run Tests
      run: |
        java -jar lib/junit-platform-console-standalone.jar --class-path bin --scan-classpath

    - name: Package JAR
      run: |
        jar cfe SistemaGestionEmpleados.jar SistemaGestionEmpleados -C bin .

    - name: Generate Tag
      id: tag
      run: echo "tag_name=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: SistemaGestionEmpleados.jar
        tag_name: ${{ steps.tag.outputs.tag_name }}
        name: Release ${{ steps.tag.outputs.tag_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
